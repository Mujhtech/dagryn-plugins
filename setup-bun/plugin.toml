[plugin]
name = "setup-bun"
description = "Install and configure Bun runtime and package manager"
version = "1.2.0"
type = "composite"
author = "dagryn"
license = "MIT"

[inputs.bun-version]
description = "Bun version to install"
default = "1.2.5"

[inputs.cache]
description = "Cache Bun install cache directory"
default = "true"

[[step]]
name = "detect-platform"
command = """
BUN_OS="${os}"
BUN_ARCH="${arch}"
if [ "$BUN_ARCH" = "amd64" ]; then BUN_ARCH="x64"; fi
if [ "$BUN_ARCH" = "arm64" ]; then BUN_ARCH="aarch64"; fi

# Detect musl libc
BUN_LIBC=""
if [ "$BUN_OS" = "linux" ]; then
  if command -v ldd >/dev/null 2>&1 && ldd --version 2>&1 | grep -qi musl; then
    BUN_LIBC="musl"
  elif [ -f /etc/alpine-release ]; then
    BUN_LIBC="musl"
  else
    BUN_LIBC="glibc"
  fi
  echo "Platform: $BUN_OS-$BUN_ARCH ($BUN_LIBC)"
else
  echo "Platform: $BUN_OS-$BUN_ARCH"
fi
"""

[[step]]
name = "download-and-install"
command = """
BUN_VERSION="${inputs.bun-version}"

# Skip if bun is already available on PATH
if command -v bun >/dev/null 2>&1; then
  echo "Bun $(bun --version) already available, skipping install"
  exit 0
fi

BUN_OS="${os}"
BUN_ARCH="${arch}"
if [ "$BUN_ARCH" = "amd64" ]; then BUN_ARCH="x64"; fi
if [ "$BUN_ARCH" = "arm64" ]; then BUN_ARCH="aarch64"; fi

# Detect musl and adjust binary name (Bun ships musl-specific binaries)
BUN_SUFFIX=""
if [ "$BUN_OS" = "linux" ]; then
  if command -v ldd >/dev/null 2>&1 && ldd --version 2>&1 | grep -qi musl; then
    BUN_SUFFIX="-musl"
  elif [ -f /etc/alpine-release ]; then
    BUN_SUFFIX="-musl"
  fi
fi

INSTALL_DIR="$HOME/.dagryn/tools/bun-$BUN_VERSION"
if [ -d "$INSTALL_DIR" ] && [ -f "$INSTALL_DIR/bun" ]; then
  if "$INSTALL_DIR/bun" --version >/dev/null 2>&1; then
    echo "Bun $BUN_VERSION already installed"
    exit 0
  fi
  echo "Existing Bun binary cannot execute, re-downloading..."
  rm -rf "$INSTALL_DIR"
fi

mkdir -p "$INSTALL_DIR"
ZIPFILE="bun-${BUN_OS}-${BUN_ARCH}${BUN_SUFFIX}.zip"
URL="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/${ZIPFILE}"
echo "Downloading Bun $BUN_VERSION from $URL"
TMPDIR=$(mktemp -d)
if command -v curl >/dev/null 2>&1; then
  curl -fsSL -o "$TMPDIR/$ZIPFILE" "$URL"
elif command -v wget >/dev/null 2>&1; then
  wget -q -O "$TMPDIR/$ZIPFILE" "$URL"
else
  echo "Error: curl or wget is required" >&2; exit 1
fi
if [ ! -s "$TMPDIR/$ZIPFILE" ]; then
  echo "Error: failed to download $URL" >&2; rm -rf "$TMPDIR"; exit 1
fi
# Install unzip if missing (Alpine)
if ! command -v unzip >/dev/null 2>&1; then
  if command -v apk >/dev/null 2>&1; then
    if [ "$(id -u 2>/dev/null || echo 1)" = "0" ]; then
      apk add --no-cache unzip >/dev/null 2>&1 || true
    fi
  elif command -v apt-get >/dev/null 2>&1; then
    if command -v sudo >/dev/null 2>&1; then
      sudo apt-get update >/dev/null 2>&1 || true
      sudo apt-get install -y unzip >/dev/null 2>&1 || true
    else
      apt-get update >/dev/null 2>&1 || true
      apt-get install -y unzip >/dev/null 2>&1 || true
    fi
  elif command -v dnf >/dev/null 2>&1; then
    dnf install -y unzip >/dev/null 2>&1 || true
  elif command -v yum >/dev/null 2>&1; then
    yum install -y unzip >/dev/null 2>&1 || true
  fi
fi
if ! command -v unzip >/dev/null 2>&1; then
  echo "Error: unzip is required to extract Bun archive" >&2
  exit 1
fi
unzip -qo "$TMPDIR/$ZIPFILE" -d "$TMPDIR"
cp "$TMPDIR/bun-${BUN_OS}-${BUN_ARCH}${BUN_SUFFIX}/bun" "$INSTALL_DIR/bun"
chmod +x "$INSTALL_DIR/bun"
rm -rf "$TMPDIR"
if [ ! -f "$INSTALL_DIR/bun" ]; then
  echo "Error: bun binary not found after extraction" >&2; exit 1
fi
if ! "$INSTALL_DIR/bun" --version >/dev/null 2>&1; then
  echo "Error: bun binary exists but cannot execute" >&2
  rm -rf "$INSTALL_DIR"
  exit 1
fi
echo "Bun $BUN_VERSION downloaded successfully"
"""

[[step]]
name = "set-path"
command = """
BUN_VERSION="${inputs.bun-version}"
INSTALL_DIR="$HOME/.dagryn/tools/bun-$BUN_VERSION"
if [ -d "$INSTALL_DIR" ]; then
  export PATH="$INSTALL_DIR:$PATH"
fi
echo "Bun $(bun --version 2>/dev/null || echo 'unknown') ready"
"""
[step.env]
PATH = "$HOME/.dagryn/tools/bun-${inputs.bun-version}:$PATH"
BUN_INSTALL = "$HOME/.dagryn/tools/bun-${inputs.bun-version}"

[[step]]
name = "cache-bun"
if = "${inputs.cache}"
command = """
CACHE_DIR="${BUN_INSTALL:-$HOME/.bun}/install/cache"
if [ -d "$CACHE_DIR" ]; then
  echo "Bun cache at $CACHE_DIR eligible for caching"
else
  echo "Bun cache not yet created, will be cached after first install"
fi
"""

[[cleanup]]
name = "shell-cache-reset"
command = """
hash -r 2>/dev/null || true
echo "setup-bun cleanup complete"
"""
