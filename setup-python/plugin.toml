[plugin]
name = "setup-python"
description = "Install and configure Python"
version = "1.1.0"
type = "composite"
author = "dagryn"
license = "MIT"

[inputs.python-version]
description = "Python version to install"
default = "3.12"

[inputs.cache]
description = "Cache pip packages"
default = "true"

[inputs.cleanup-python-version-file]
description = "Remove .python-version after execution (for pyenv local setups)"
default = "false"

[[step]]
name = "check-existing"
command = """
WANTED="${inputs.python-version}"
CURRENT=$(python3 --version 2>/dev/null | awk '{print $2}' || echo "none")
echo "Wanted: $WANTED, Current: $CURRENT"
if echo "$CURRENT" | grep -q "^$WANTED"; then
  echo "Python $WANTED already available"
else
  echo "Python $WANTED not found, installation required"
fi
"""

[[step]]
name = "install-python"
command = """
WANTED="${inputs.python-version}"
CURRENT=$(python3 --version 2>/dev/null | awk '{print $2}' || echo "none")
if echo "$CURRENT" | grep -q "^$WANTED"; then
  echo "Python $WANTED already available, skipping install"
  exit 0
fi
if command -v pyenv >/dev/null 2>&1; then
  echo "Installing Python $WANTED via pyenv"
  if ! pyenv install -s "$WANTED"; then
    echo "Error: pyenv install failed for Python $WANTED" >&2
    exit 1
  fi
  pyenv local "$WANTED"
elif command -v apk >/dev/null 2>&1; then
  echo "Installing Python via apk (Alpine)"
  if [ "$(id -u 2>/dev/null || echo 1)" != "0" ]; then
    echo "Error: apk install requires root privileges [permission_denied]" >&2
    exit 1
  fi
  if ! apk add --no-cache python3 py3-pip; then
    echo "Error: apk install failed" >&2
    exit 1
  fi
elif command -v apt-get >/dev/null 2>&1; then
  echo "Installing Python via apt-get"
  if [ "$(id -u 2>/dev/null || echo 1)" != "0" ] && ! command -v sudo >/dev/null 2>&1; then
    echo "Error: apt-get install requires root or sudo [permission_denied]" >&2
    exit 1
  fi
  APT_PREFIX=""
  if command -v sudo >/dev/null 2>&1; then
    APT_PREFIX="sudo"
  fi
  if ! ($APT_PREFIX apt-get update && $APT_PREFIX apt-get install -y "python${WANTED}"); then
    echo "Falling back to distro default python3 packages"
    if ! ($APT_PREFIX apt-get install -y python3 python3-pip python3-venv); then
      echo "Error: apt-get install failed" >&2
      exit 1
    fi
  fi
elif command -v dnf >/dev/null 2>&1; then
  echo "Installing Python via dnf"
  if ! dnf install -y python3 python3-pip; then
    echo "Error: dnf install failed" >&2
    exit 1
  fi
elif command -v yum >/dev/null 2>&1; then
  echo "Installing Python via yum"
  if ! yum install -y python3 python3-pip; then
    echo "Error: yum install failed" >&2
    exit 1
  fi
elif command -v brew >/dev/null 2>&1; then
  if ! brew install "python@${WANTED}"; then
    echo "Error: brew install failed" >&2
    exit 1
  fi
else
  echo "Error: no supported package manager found to install Python $WANTED" >&2
  exit 1
fi
"""

[[step]]
name = "setup-virtualenv"
command = """
if [ ! -d ".venv" ]; then
  echo "Creating virtualenv"
  python3 -m venv .venv
fi
echo "Virtualenv ready at .venv"
echo "Activate with: source .venv/bin/activate"
"""

[[step]]
name = "cache-pip"
if = "${inputs.cache}"
command = """
PIP_CACHE=$(python3 -m pip cache dir 2>/dev/null || echo "$HOME/.cache/pip")
echo "Pip cache at $PIP_CACHE eligible for caching"
"""

[[cleanup]]
name = "remove-python-version-file"
if = "${inputs.cleanup-python-version-file}"
command = """
if [ -f ".python-version" ] && grep -q "^${inputs.python-version}" ".python-version"; then
  rm -f ".python-version"
  echo "Removed .python-version created for ${inputs.python-version}"
fi
"""

[[cleanup]]
name = "shell-cache-reset"
command = """
hash -r 2>/dev/null || true
echo "setup-python cleanup complete"
"""
